version: "3.9"

services:
  db:
    image: postgres:15
    env_file:
      - .env
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  api-dev:
    build:
      context: .
      target: dev
    command: npm run start:dev
    volumes:
      - .:/app
      - /app/node_modules
    ports:
      - "${DEV_PORT}:3000"
    env_file:
      - .env
    depends_on:
      - db

  api-prod:
    build:
      context: .
      target: production
    ports:
      - "${PROD_PORT}:3000"
    env_file:
      - .env
    depends_on:
      - db

volumes:
  db_data:
