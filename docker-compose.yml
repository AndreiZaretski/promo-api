networks:
  my-network:
    driver: bridge

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${DB_PORT}:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    networks:
      - my-network

  api-dev:
    build:
      context: .
      target: dev
    volumes:
      - .:/app
      # - /app/node_modules
    ports:
      - "${DEV_PORT}:3000"
    env_file:
      - .env
    environment:
      - DATABASE_URL=${DATABASE_URL_DOCKER}
    depends_on:
      - db
    networks:
      - my-network

  api-prod:
    build:
      context: .
      target: production
    ports:
      - "${PROD_PORT}:3000"
    env_file:
      - .env
    environment:
      # - DATABASE_URL=${DATABASE_URL_DOCKER}
      DATABASE_URL: "postgresql://postgres:postgres@db:5432/promo"
    depends_on:
      - db
    networks:
      - my-network

volumes:
  db_data:
